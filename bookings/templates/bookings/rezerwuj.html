<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rezerwacja - {{ sala.numer }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-body">
                <h3>Rezerwacja: Sala {{ sala.numer }}</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Potwierdź rezerwację</button>
                    <a href="{% url 'lista_sal' %}" class="btn btn-link w-100 mt-2">Anuluj</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
